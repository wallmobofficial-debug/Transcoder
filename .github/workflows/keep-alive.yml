name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Get service URL from Render API
        id: url
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          URL=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=trascoder" | \
            python3 -c "
import sys,json
data=json.load(sys.stdin)
svc=next((s for s in data if s['service']['name']=='trascoder'), None)
print(svc['service']['url'] if svc else '')
" 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Ping health endpoint
        env:
          URL: ${{ steps.url.outputs.url }}
        run: |
          TARGET="${URL:-https://web-based-ipl-team-prediction-4ak8.onrender.com}/health"
          echo "Pinging $TARGET"
          curl -sSf -o /dev/null -w "HTTP %{http_code}\n" "$TARGET" || echo "Ping failed"
